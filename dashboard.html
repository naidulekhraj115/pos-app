<!DOCTYPE html>
<html>
<head>
  <title>Dashboard</title>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      margin:0;
      font-family:Arial;
      display:flex;
      height:100vh;
      overflow:hidden;
    }

    .sidebar {
      width:220px;
      background:#0f172a;
      color:white;
      height:100vh;
      padding:20px;
      position:fixed;
      left:0;
      top:0;
      box-sizing:border-box;
    }

    .sidebar p {
      margin:15px 0;
      cursor:pointer;
      color:#cbd5e1;
    }

    .main {
      flex:1;
      margin-left:220px;
      height:100vh;
      overflow-y:auto;
      background:#f3f4f6;
      padding:20px;
    }

    .topbar {
      display:flex;
      justify-content:space-between;
      align-items:center;
    }

    .cards {
      display:flex;
      gap:20px;
      margin-top:20px;
    }

    .card {
      background:white;
      padding:20px;
      border-radius:12px;
      flex:1;
    }

    .charts {
      display:flex;
      gap:20px;
      margin-top:30px;
    }

    .chart-box {
      flex:1;
      background:white;
      padding:20px;
      border-radius:12px;
      height:280px;
    }

    canvas {
      width:100%!important;
      height:200px!important;
    }

    .table-box {
      margin-top:30px;
      background:white;
      padding:20px;
      border-radius:12px;
    }

    table {
      width:100%;
      border-collapse:collapse;
    }

    th, td {
      padding:10px;
      border-bottom:1px solid #ddd;
    }

    .btn {
      background:#1e3a8a;
      color:white;
      padding:6px 12px;
      border:none;
      border-radius:6px;
      cursor:pointer;
    }
  </style>
</head>

<body>

<div class="sidebar">
  <h2>POS System</h2>
  <p id="businessDate"></p>

  <p>Dashboard</p>
  <p onclick="goPOS()">Point of Sale</p>
  <p>Products</p>
  <p>Reports</p>
</div>

<div class="main">

  <div class="topbar">
    <h2>Dashboard</h2>
    <div>
      <span id="userEmail"></span>
      <button class="btn" onclick="logout()">Logout</button>
    </div>
  </div>

  <div class="cards">
    <div class="card">
      <h4>Total Sales</h4>
      <h2 id="sales">₹0</h2>
    </div>

    <div class="card">
      <h4>Total Products</h4>
      <h2 id="products">0</h2>
    </div>

    <div class="card">
      <h4>Profit</h4>
      <h2 id="profit">₹0</h2>
    </div>
  </div>

  <div class="charts">
    <div class="chart-box">
      <canvas id="pieChart"></canvas>
    </div>

    <div class="chart-box">
      <canvas id="barChart"></canvas>
    </div>
  </div>

  <div class="table-box">
    <h3>Profit by Product</h3>

    <table>
      <thead>
        <tr>
          <th>Product</th>
          <th>Qty</th>
          <th>Revenue</th>
          <th>Profit</th>
        </tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>
  </div>

</div>

<script type="module">
import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

const supabase = createClient(
  "https://glsjjkcnrhmdiqtfasrv.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imdsc2pqa2NucmhtZGlxdGZhc3J2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgzMzgxNDUsImV4cCI6MjA5MzkxNDE0NX0.kg6Ng-phIWZIBfk0KLFDl0CaRD1IPL_t_8dExIZ4yoM"
);

let pieChart, barChart;

// USER
async function loadUser() {
  const { data } = await supabase.auth.getUser();
  document.getElementById("userEmail").innerText = data?.user?.email || "";
}

// DATE
function setDate() {
  document.getElementById("businessDate").innerText =
    "Date: " + new Date().toLocaleDateString("en-IN");
}

// DASHBOARD
async function loadDashboard() {

  const { data: products, error: pError } =
    await supabase.from("products").select("*");

  if (pError) {
    console.error("Products error:", pError);
    return;
  }

  document.getElementById("products").innerText = products?.length || 0;

  let totalSales = 0;
  let totalCost = 0;

  let html = "";
  let labels = [];
  let profits = [];

  products?.forEach(p => {
    let revenue = (p.selling_price || 0) * (p.quantity || 0);
    let cost = (p.buying_price || 0) * (p.quantity || 0);
    let profit = revenue - cost;

    totalSales += revenue;
    totalCost += cost;

    labels.push(p.name);
    profits.push(profit);

    html += `
      <tr>
        <td>${p.name}</td>
        <td>${p.quantity}</td>
        <td>₹${revenue}</td>
        <td>₹${profit}</td>
      </tr>
    `;
  });

  let totalProfit = totalSales - totalCost;

  document.getElementById("sales").innerText = "₹" + totalSales;
  document.getElementById("profit").innerText = "₹" + totalProfit;

  document.getElementById("tableBody").innerHTML = html;

  if (pieChart) pieChart.destroy();
  if (barChart) barChart.destroy();

  pieChart = new Chart(document.getElementById("pieChart"), {
    type: "pie",
    data: {
      labels: ["Profit", "Cost"],
      datasets: [{ data: [totalProfit, totalCost] }]
    }
  });

  barChart = new Chart(document.getElementById("barChart"), {
    type: "bar",
    data: {
      labels: labels,
      datasets: [{ label: "Profit", data: profits }]
    }
  });
}

// NAV
window.goPOS = () => window.location = "pos.html";

// LOGOUT
window.logout = async function () {
  await supabase.auth.signOut();
  window.location.href = "/";
};

loadUser();
setDate();
loadDashboard();
</script>

</body>
</html>
