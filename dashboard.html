<!DOCTYPE html>
<html>
<head>
  <title>Dashboard</title>

  <style>
    body {
      margin:0;
      font-family: Arial;
      display:flex;
    }

    /* SIDEBAR */
    .sidebar {
      width:220px;
      background:#0f172a;
      color:white;
      height:100vh;
      padding:20px;
    }

    .sidebar h2 {
      margin-bottom:20px;
    }

    .sidebar p {
      margin:15px 0;
      cursor:pointer;
    }

    .sidebar p:hover {
      color:#93c5fd;
    }

    /* MAIN */
    .main {
      flex:1;
      padding:20px;
      background:#f3f4f6;
    }

    .topbar {
      display:flex;
      justify-content:space-between;
      align-items:center;
    }

    .logout {
      background:#ef4444;
      color:white;
      padding:6px 10px;
      border:none;
      border-radius:6px;
      cursor:pointer;
    }

    .card {
      background:white;
      padding:20px;
      margin-top:20px;
      border-radius:10px;
    }

  </style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <h2>POS System</h2>

  <p onclick="goDashboard()">Dashboard</p>
  <p onclick="goPOS()">Point of Sale</p>
  <p onclick="goProducts()">Products</p>
  <p onclick="goReports()">Reports</p>
</div>

<!-- MAIN -->
<div class="main">

  <div class="topbar">
    <h2>Dashboard</h2>

    <div>
      <span id="userEmail"></span>
      <button class="logout" onclick="logout()">Logout</button>
    </div>
  </div>

  <div class="card">
    Welcome to your POS Dashboard 🚀
  </div>

</div>

<!-- SUPABASE -->
<script type="module">
import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

const supabase = createClient(
  "https://glsjjkcnrhmdiqtfasrv.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imdsc2pqa2NucmhtZGlxdGZhc3J2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgzMzgxNDUsImV4cCI6MjA5MzkxNDE0NX0.kg6Ng-phIWZIBfk0KLFDl0CaRD1IPL_t_8dExIZ4yoM"
);

/* ---------- NAVIGATION ---------- */
window.goDashboard = () => window.location = "dashboard.html";
window.goPOS = () => window.location = "pos.html";
window.goProducts = () => window.location = "products.html";
window.goReports = () => alert("Reports coming soon");

/* ---------- LOGOUT ---------- */
window.logout = async function(){
  await supabase.auth.signOut();
  window.location = "index.html";
};

/* ---------- SHOW USER EMAIL ---------- */
async function loadUser(){
  const { data } = await supabase.auth.getUser();

  if(data?.user){
    document.getElementById("userEmail").innerText = data.user.email;
  } else {
    // agar login nahi hai to redirect
    window.location = "index.html";
  }
}

loadUser();

</script>

</body>
</html>
