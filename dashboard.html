<!DOCTYPE html>
<html>
<head>
  <title>Dashboard</title>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body { margin:0; font-family:Arial; display:flex; }

    .sidebar {
      width:220px; background:#0f172a; color:white;
      height:100vh; padding:20px;
    }

    .main { flex:1; background:#f3f4f6; padding:20px; }

    .topbar { display:flex; justify-content:space-between; }

    .cards { display:flex; gap:20px; margin-top:20px; }

    .card {
      background:white; padding:20px;
      border-radius:10px; flex:1;
    }

    .charts { display:flex; gap:20px; margin-top:30px; }

    .chart-box {
      flex:1; background:white;
      padding:20px; border-radius:10px;
      height:300px;
    }

    canvas { width:100%!important; height:220px!important; }

    .table-box {
      margin-top:30px;
      background:white;
      padding:20px;
      border-radius:10px;
    }

    table { width:100%; border-collapse:collapse; }

    th,td {
      padding:10px;
      border-bottom:1px solid #ddd;
    }

    .btn {
      background:#1e3a8a; color:white;
      padding:6px 10px; border:none;
      cursor:pointer; border-radius:5px;
    }
  </style>
</head>

<body>

<div class="sidebar">
  <h2>POS System</h2>
  <p id="businessDate"></p>
</div>

<div class="main">

  <div class="topbar">
    <h2>Dashboard</h2>
    <div>
      <span id="userEmail"></span>
      <button class="btn" onclick="logout()">Logout</button>
    </div>
  </div>

  <!-- DATE FILTER -->
  <div style="margin-top:20px;">
    <input type="date" id="startDate">
    <input type="date" id="endDate">
    <button class="btn" onclick="filterByDate()">Apply</button>
  </div>

  <!-- CARDS -->
  <div class="cards">
    <div class="card">
      <h4>Total Sales</h4>
      <h2 id="sales">₹0</h2>
    </div>

    <div class="card">
      <h4>Total Products</h4>
      <h2 id="products">0</h2>
    </div>

    <div class="card">
      <h4>Profit</h4>
      <h2 id="profit">₹0</h2>
    </div>
  </div>

  <!-- MTD YTD -->
  <div class="cards">
    <div class="card"><h4>MTD</h4><h2 id="mtd">₹0</h2></div>
    <div class="card"><h4>YTD</h4><h2 id="ytd">₹0</h2></div>
    <div class="card"><h4>LYMTD</h4><h2 id="lymtd">₹0</h2></div>
    <div class="card"><h4>LYYTD</h4><h2 id="lyytd">₹0</h2></div>
  </div>

  <!-- CHARTS -->
  <div class="charts">
    <div class="chart-box">
      <canvas id="pieChart"></canvas>
    </div>
    <div class="chart-box">
      <canvas id="barChart"></canvas>
    </div>
  </div>

  <!-- PRODUCTS -->
  <div class="table-box">
    <h3>Products (Live DB)</h3>
    <table>
      <thead>
        <tr>
          <th>Name</th>
          <th>Buying</th>
          <th>Selling</th>
          <th>Qty</th>
        </tr>
      </thead>
      <tbody id="productTable"></tbody>
    </table>
  </div>

</div>

<script type="module">
import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

const supabase = createClient(
  "https://glsjjkcnrhmdiqtfasrv.supabase.co",
  "YOUR_ANON_KEY"
);

// USER
async function loadUser() {
  const { data: { user } } = await supabase.auth.getUser();
  if (user) {
    document.getElementById("userEmail").innerText = user.email;
  }
}

// BUSINESS DATE
function setBusinessDate() {
  const today = new Date().toLocaleDateString("en-IN", {
    day:"2-digit", month:"short", year:"numeric"
  });
  document.getElementById("businessDate").innerText = "Date: " + today;
}

// PRODUCTS (FIXED)
async function loadProducts() {
  const { data } = await supabase.from("products").select("*");

  document.getElementById("products").innerText = data.length;

  let html = "";
  data.forEach(p => {
    html += `
      <tr>
        <td>${p.name}</td>
        <td>₹${p.buying_price}</td>
        <td>₹${p.selling_price}</td>
        <td>${p.quantity}</td>
      </tr>
    `;
  });

  document.getElementById("productTable").innerHTML = html;
}

// TRANSACTIONS
let pieChart, barChart;

async function loadDashboard() {

  const { data } = await supabase.from("transactions").select("*");

  let sales=0, cost=0;

  data.forEach(t=>{
    sales += t.total_amount||0;
    cost += t.total_cost||0;
  });

  let profit = sales - cost;

  document.getElementById("sales").innerText="₹"+sales;
  document.getElementById("profit").innerText="₹"+profit;

  if(pieChart) pieChart.destroy();
  if(barChart) barChart.destroy();

  pieChart=new Chart(pieChartEl,{
    type:"pie",
    data:{labels:["Profit","Cost"],datasets:[{data:[profit,cost]}]}
  });

  barChart=new Chart(barChartEl,{
    type:"bar",
    data:{labels:["Sales","Profit"],datasets:[{data:[sales,profit]}]}
  });
}

const pieChartEl=document.getElementById("pieChart");
const barChartEl=document.getElementById("barChart");

// DATE FILTER
async function filterByDate(){
  const s=document.getElementById("startDate").value;
  const e=document.getElementById("endDate").value;

  const { data } = await supabase
    .from("transactions")
    .select("*")
    .gte("business_date",s)
    .lte("business_date",e);

  let sales=0,cost=0;
  data.forEach(t=>{
    sales+=t.total_amount||0;
    cost+=t.total_cost||0;
  });

  document.getElementById("profit").innerText="₹"+(sales-cost);
}

// MTD / YTD
async function loadMetrics(){

  const { data } = await supabase.from("transactions").select("*");

  let now=new Date();
  let y=now.getFullYear(), m=now.getMonth();

  function calc(start,end){
    let s=0,c=0;
    data.forEach(t=>{
      if(t.business_date>=start && t.business_date<=end){
        s+=t.total_amount||0;
        c+=t.total_cost||0;
      }
    });
    return s-c;
  }

  let today=now.toISOString().split("T")[0];
  let som=new Date(y,m,1).toISOString().split("T")[0];
  let soy=new Date(y,0,1).toISOString().split("T")[0];

  let ly=y-1;
  let lyToday=new Date(ly,m,now.getDate()).toISOString().split("T")[0];

  document.getElementById("mtd").innerText="₹"+calc(som,today);
  document.getElementById("ytd").innerText="₹"+calc(soy,today);
  document.getElementById("lymtd").innerText="₹"+calc(new Date(ly,m,1).toISOString().split("T")[0],lyToday);
  document.getElementById("lyytd").innerText="₹"+calc(new Date(ly,0,1).toISOString().split("T")[0],lyToday);
}

// LOGOUT
async function logout(){
  await supabase.auth.signOut();
  window.location="index.html";
}

// INIT
loadUser();
setBusinessDate();
loadProducts();
loadDashboard();
loadMetrics();

</script>

</body>
</html>
