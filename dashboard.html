<!DOCTYPE html>
<html>
<head>
  <title>Dashboard</title>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      margin:0;
      font-family:Arial;
      display:flex;
      height:100vh;
      overflow:hidden; /* FIX */
    }

    /* SIDEBAR */
    .sidebar {
      width:220px;
      background:#0f172a;
      color:white;
      height:100vh;
      padding:20px;

      position:fixed; /* FIX */
      left:0;
      top:0;
    }

    .sidebar p {
      margin:15px 0;
      cursor:pointer;
      color:#cbd5e1;
    }

    /* MAIN */
    .main {
      margin-left:220px; /* FIX */
      width:calc(100% - 220px);
      height:100vh;
      overflow-y:auto; /* FIX */
      background:#f3f4f6;
      padding:20px;
    }

    .topbar {
      display:flex;
      justify-content:space-between;
      align-items:center;
    }

    .cards {
      display:flex;
      gap:20px;
      margin-top:20px;
    }

    .card {
      background:white;
      padding:20px;
      border-radius:12px;
      flex:1;
    }

    .metrics {
      display:grid;
      grid-template-columns: repeat(4, 1fr);
      gap:20px;
      margin-top:20px;
    }

    .charts {
      display:flex;
      gap:20px;
      margin-top:30px;
    }

    .chart-box {
      flex:1;
      background:white;
      padding:20px;
      border-radius:12px;
      height:280px;
    }

    canvas {
      width:100%!important;
      height:200px!important;
    }

    .table-box {
      margin-top:30px;
      background:white;
      padding:20px;
      border-radius:12px;
    }

    table {
      width:100%;
      border-collapse:collapse;
    }

    th, td {
      padding:10px;
      border-bottom:1px solid #ddd;
    }

    .btn {
      background:#1e3a8a;
      color:white;
      padding:6px 12px;
      border:none;
      border-radius:6px;
      cursor:pointer;
    }

  </style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <h2>POS System</h2>
  <p id="businessDate"></p>

  <p>Dashboard</p>
  <p onclick="goPOS()">Point of Sale</p>
  <p onclick="goProducts()">Products</p>
  <p>Reports</p>
</div>

<!-- MAIN -->
<div class="main">

  <div class="topbar">
    <h2>Dashboard</h2>
    <div>
      <span id="userEmail"></span>
      <button class="btn" onclick="logout()">Logout</button>
    </div>
  </div>

  <!-- DATE FILTER -->
  <div style="margin-top:20px;">
    <input type="date" id="startDate">
    <input type="date" id="endDate">
    <button class="btn" onclick="filterByDate()">Apply</button>
  </div>

  <!-- TOP CARDS -->
  <div class="cards">
    <div class="card">
      <h4>Total Sales</h4>
      <h2 id="sales">₹0</h2>
    </div>

    <div class="card">
      <h4>Total Products</h4>
      <h2 id="products">0</h2>
    </div>

    <div class="card">
      <h4>Profit</h4>
      <h2 id="profit">₹0</h2>
    </div>
  </div>

  <!-- METRICS -->
  <div class="metrics">
    <div class="card"><h4>MTD</h4><h2 id="mtd">₹0</h2></div>
    <div class="card"><h4>YTD</h4><h2 id="ytd">₹0</h2></div>
    <div class="card"><h4>LYMTD</h4><h2 id="lymtd">₹0</h2></div>
    <div class="card"><h4>LYYTD</h4><h2 id="lyytd">₹0</h2></div>
  </div>

  <!-- CHARTS -->
  <div class="charts">
    <div class="chart-box">
      <canvas id="pieChart"></canvas>
    </div>

    <div class="chart-box">
      <canvas id="barChart"></canvas>
    </div>
  </div>

  <!-- PRODUCT PROFIT -->
  <div class="table-box">
    <h3>Profit by Product</h3>
    <button class="btn" onclick="exportData()">Export</button>

    <table>
      <thead>
        <tr>
          <th>Product</th>
          <th>Qty</th>
          <th>Revenue</th>
          <th>Profit</th>
        </tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>
  </div>

</div>

<script type="module">
import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

const supabase = createClient(
  "https://glsjjkcnrhmdiqtfasrv.supabase.co",
  "YOUR_ANON_KEY"
);

let pieChart, barChart, exportDataArr = [];

// USER
async function loadUser() {
  const { data: { user } } = await supabase.auth.getUser();
  document.getElementById("userEmail").innerText = user?.email || "";
}

// DATE
function setDate() {
  const d = new Date().toLocaleDateString("en-IN");
  document.getElementById("businessDate").innerText = "Date: " + d;
}

// DASHBOARD
async function loadDashboard() {

  const { data: products } = await supabase.from("products").select("*");
  document.getElementById("products").innerText = products?.length || 0;

  const { data: transactions } = await supabase.from("transactions").select("*");

  let sales=0, cost=0;
  let map={};

  transactions?.forEach(t=>{
    sales+=t.total_amount||0;
    cost+=t.total_cost||0;

    t.items?.forEach(i=>{
      if(!map[i.name]) map[i.name]={qty:0,revenue:0,profit:0};

      map[i.name].qty+=i.qty;
      map[i.name].revenue+=i.price*i.qty;
      map[i.name].profit+=(i.price-i.buying_price)*i.qty;
    });
  });

  let profit=sales-cost;

  document.getElementById("sales").innerText="₹"+sales;
  document.getElementById("profit").innerText="₹"+profit;

  // CHART FIX
  if(pieChart) pieChart.destroy();
  if(barChart) barChart.destroy();

  pieChart=new Chart(document.getElementById("pieChart"),{
    type:"pie",
    data:{
      labels:["Profit","Cost"],
      datasets:[{data:[profit,cost]}]
    }
  });

  barChart=new Chart(document.getElementById("barChart"),{
    type:"bar",
    data:{
      labels:["Sales","Profit"],
      datasets:[{data:[sales,profit]}]
    }
  });

  // TABLE
  let html="";
  exportDataArr=[];

  for(let name in map){
    let p=map[name];

    html+=`
      <tr>
        <td>${name}</td>
        <td>${p.qty}</td>
        <td>₹${p.revenue}</td>
        <td>₹${p.profit}</td>
      </tr>
    `;

    exportDataArr.push({name,...p});
  }

  document.getElementById("tableBody").innerHTML=html;
}

// EXPORT
function exportData(){
  let csv="Product,Qty,Revenue,Profit\n";
  exportDataArr.forEach(d=>{
    csv+=`${d.name},${d.qty},${d.revenue},${d.profit}\n`;
  });

  let blob=new Blob([csv]);
  let a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download="profit.csv";
  a.click();
}

// NAV
window.goPOS=()=>window.location="pos.html";
window.goProducts=()=>window.location="products.html";

// LOGOUT FIXED
window.logout = async function () {
  await supabase.auth.signOut();
  window.location.href = "/index.html"; // FIXED PATH
};

// INIT
loadUser();
setDate();
loadDashboard();

</script>

</body>
</html>
