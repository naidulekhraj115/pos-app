  "https://glsjjkcnrhmdiqtfasrv.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imdsc2pqa2NucmhtZGlxdGZhc3J2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgzMzgxNDUsImV4cCI6MjA5MzkxNDE0NX0.kg6Ng-phIWZIBfk0KLFDl0CaRD1IPL_t_8dExIZ4yoM"
);

let pieChart, barChart, exportDataArr = [];

// USER
async function loadUser() {
  const { data: { user } } = await supabase.auth.getUser();
  document.getElementById("userEmail").innerText = user?.email || "";
}

// DATE
function setDate() {
  const d = new Date().toLocaleDateString("en-IN");
  document.getElementById("businessDate").innerText = "Date: " + d;
}

// DASHBOARD
async function loadDashboard() {

  const { data: products } = await supabase.from("products").select("*");
  document.getElementById("products").innerText = products.length;

  const { data: transactions } = await supabase.from("transactions").select("*");

  let sales=0, cost=0;
  let map={};

  transactions.forEach(t=>{
    sales+=t.total_amount||0;
    cost+=t.total_cost||0;

    t.items?.forEach(i=>{
      if(!map[i.name]) map[i.name]={qty:0,revenue:0,profit:0};

      map[i.name].qty+=i.qty;
      map[i.name].revenue+=i.price*i.qty;
      map[i.name].profit+=(i.price-i.buying_price)*i.qty;
    });
  });

  let profit=sales-cost;

  document.getElementById("sales").innerText="₹"+sales;
  document.getElementById("profit").innerText="₹"+profit;

  if(pieChart) pieChart.destroy();
  if(barChart) barChart.destroy();

  pieChart=new Chart(document.getElementById("pieChart"),{
    type:"pie",
    data:{
      labels:["Profit","Cost"],
      datasets:[{data:[profit,cost]}]
    }
  });

  barChart=new Chart(document.getElementById("barChart"),{
    type:"bar",
    data:{
      labels:["Sales","Profit"],
      datasets:[{data:[sales,profit]}]
    }
  });

  let html="";
  exportDataArr=[];

  for(let name in map){
    let p=map[name];

    html+=`
      <tr>
        <td>${name}</td>
        <td>${p.qty}</td>
        <td>₹${p.revenue}</td>
        <td>₹${p.profit}</td>
      </tr>
    `;

    exportDataArr.push({name,...p});
  }

  document.getElementById("tableBody").innerHTML=html;
}

// EXPORT
function exportData(){
  let csv="Product,Qty,Revenue,Profit\n";
  exportDataArr.forEach(d=>{
    csv+=`${d.name},${d.qty},${d.revenue},${d.profit}\n`;
  });

  let blob=new Blob([csv]);
  let a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download="profit.csv";
  a.click();
}

window.goPOS=()=>window.location="pos.html";

</script>
