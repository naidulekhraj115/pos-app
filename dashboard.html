<!DOCTYPE html>
<html>
<head>
  <title>Dashboard</title>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      display: flex;
    }

    .sidebar {
      width: 220px;
      background: #0f172a;
      color: white;
      height: 100vh;
      padding: 20px;
    }

    .sidebar h2 {
      margin-bottom: 30px;
    }

    .sidebar p {
      margin: 15px 0;
      cursor: pointer;
    }

    .main {
      flex: 1;
      background: #f3f4f6;
      padding: 20px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .cards {
      display: flex;
      gap: 20px;
      margin-top: 20px;
    }

    .card {
      background: white;
      padding: 20px;
      border-radius: 10px;
      flex: 1;
    }

    .charts {
      display: flex;
      gap: 20px;
      margin-top: 30px;
    }

    canvas {
      background: white;
      padding: 20px;
      border-radius: 10px;
    }

    .logout {
      background: red;
      color: white;
      border: none;
      padding: 8px 12px;
      cursor: pointer;
      border-radius: 5px;
    }
  </style>
</head>

<body>

<div class="sidebar">
  <h2>POS System</h2>
  <p>Dashboard</p>
  <p>Point of Sale</p>
  <p>Products</p>
  <p>Reports</p>
</div>

<div class="main">

  <div class="topbar">
    <h2>Dashboard</h2>

    <div>
      <span id="userEmail"></span>
      <button class="logout" onclick="logout()">Logout</button>
    </div>
  </div>

  <div class="cards">
    <div class="card">
      <h4>Total Sales</h4>
      <h2 id="sales">₹0</h2>
    </div>

    <div class="card">
      <h4>Total Products</h4>
      <h2 id="products">0</h2>
    </div>

    <div class="card">
      <h4>Profit</h4>
      <h2 id="profit">₹0</h2>
    </div>
  </div>

  <div class="charts">
    <canvas id="pieChart" width="300"></canvas>
    <canvas id="barChart" width="300"></canvas>
  </div>

</div>

<script type="module">
import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

const supabase = createClient(
  "https://glsjjkcnrhmdiqtfasrv.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imdsc2pqa2NucmhtZGlxdGZhc3J2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgzMzgxNDUsImV4cCI6MjA5MzkxNDE0NX0.kg6Ng-phIWZIBfk0KLFDl0CaRD1IPL_t_8dExIZ4yoM"
);

// 🔥 SHOW LOGGED IN USER
async function loadUser() {
  const { data } = await supabase.auth.getUser();

  if (data.user) {
    document.getElementById("userEmail").innerText = data.user.email;
  } else {
    window.location = "index.html";
  }
}

// 🔥 LOGOUT
async function logout() {
  await supabase.auth.signOut();
  window.location = "index.html";
}

// 🔥 DASHBOARD DATA
async function loadDashboard() {

  // PRODUCTS COUNT
  const { data: products } = await supabase
    .from("products")
    .select("*");

  document.getElementById("products").innerText = products.length;

  // TRANSACTIONS
  const { data: transactions } = await supabase
    .from("transactions")
    .select("*");

  let totalSales = 0;
  let totalCost = 0;

  transactions.forEach(t => {
    totalSales += t.total_amount || 0;
    totalCost += t.total_cost || 0;
  });

  let profit = totalSales - totalCost;

  document.getElementById("sales").innerText = "₹" + totalSales;
  document.getElementById("profit").innerText = "₹" + profit;

  // PIE CHART
  new Chart(document.getElementById("pieChart"), {
    type: "pie",
    data: {
      labels: ["Profit", "Cost"],
      datasets: [{
        data: [profit, totalCost],
      }]
    }
  });

  // BAR CHART
  new Chart(document.getElementById("barChart"), {
    type: "bar",
    data: {
      labels: ["Sales", "Profit"],
      datasets: [{
        data: [totalSales, profit],
      }]
    }
  });

}

// INIT
loadUser();
loadDashboard();

// OPTIONAL LIVE UPDATE
setInterval(loadDashboard, 5000);

</script>

</body>
</html>
