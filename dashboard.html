<!DOCTYPE html>
<html>
<head>
  <title>Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      margin:0;
      font-family:Arial;
      display:flex;
      height:100vh;
      overflow:hidden;
    }

    .sidebar {
      width:220px;
      background:#0f172a;
      color:white;
      height:100vh;
      padding:20px;
      position:fixed;
      left:0;
      top:0;
      box-sizing:border-box;
    }

    .sidebar p {
      margin:15px 0;
      cursor:pointer;
      color:#cbd5e1;
    }

    .main {
      flex:1;
      margin-left:220px;
      height:100vh;
      overflow-y:auto;
      background:#f3f4f6;
      padding:20px;
    }

    .topbar {
      display:flex;
      justify-content:space-between;
      align-items:center;
    }

    .cards {
      display:flex;
      gap:20px;
      margin-top:20px;
    }

    .card {
      background:white;
      padding:20px;
      border-radius:12px;
      flex:1;
    }

    .charts {
      display:flex;
      gap:20px;
      margin-top:30px;
    }

    .chart-box {
      flex:1;
      background:white;
      padding:20px;
      border-radius:12px;
      height:280px;
    }

    canvas {
      width:100%!important;
      height:200px!important;
    }

    .table-box {
      margin-top:30px;
      background:white;
      padding:20px;
      border-radius:12px;
    }

    table {
      width:100%;
      border-collapse:collapse;
    }

    th, td {
      padding:10px;
      border-bottom:1px solid #ddd;
    }

    .btn {
      background:#1e3a8a;
      color:white;
      padding:6px 12px;
      border:none;
      border-radius:6px;
      cursor:pointer;
    }
  </style>
</head>

<body>

<div class="sidebar">
  <h2>POS System</h2>
  <p id="businessDate"></p>

  <p>Dashboard</p>
  <p onclick="goPOS()">Point of Sale</p>
  <p onclick="goProducts()">Products</p>
  <p>Reports</p>
</div>

<div class="main">

  <div class="topbar">
    <h2>Dashboard</h2>
    <div>
      <span id="userEmail"></span>
      <button class="btn" onclick="logout()">Logout</button>
    </div>
  </div>

  <!-- DATE RANGE (RESTORED) -->
  <div style="margin-top:20px;">
    <input type="date" id="startDate">
    <input type="date" id="endDate">
    <button class="btn" onclick="loadDashboard()">Apply</button>
  </div>

  <div class="cards">
    <div class="card">
      <h4>Total Sales</h4>
      <h2 id="sales">₹0</h2>
    </div>

    <div class="card">
      <h4>Total Products</h4>
      <h2 id="products">0</h2>
    </div>

    <div class="card">
      <h4>Profit</h4>
      <h2 id="profit">₹0</h2>
    </div>
  </div>

  <div class="charts">
    <div class="chart-box">
      <canvas id="pieChart"></canvas>
    </div>

    <div class="chart-box">
      <canvas id="barChart"></canvas>
    </div>
  </div>

  <div class="table-box">
    <h3>Product-wise Sales</h3>
    <table>
      <thead>
        <tr>
          <th>Product</th>
          <th>Revenue</th>
        </tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>
  </div>

</div>

<script type="module">
import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

const supabase = createClient(
  "https://glsjjkcnrhmdiqtfasrv.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imdsc2pqa2NucmhtZGlxdGZhc3J2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgzMzgxNDUsImV4cCI6MjA5MzkxNDE0NX0.kg6Ng-phIWZIBfk0KLFDl0CaRD1IPL_t_8dExIZ4yoM"
);

let pieChart, barChart;

// USER
async function loadUser() {
  const { data } = await supabase.auth.getUser();
  document.getElementById("userEmail").innerText = data?.user?.email || "";
}

// DATE
function setDate() {
  document.getElementById("businessDate").innerText =
    "Date: " + new Date().toLocaleDateString("en-IN");
}

// MAIN LOGIC
async function loadDashboard() {

  const start = document.getElementById("startDate").value;
  const end = document.getElementById("endDate").value;

  const { data: products } = await supabase.from("products").select("*");
  document.getElementById("products").innerText = products?.length || 0;

  let query = supabase.from("transactions").select("*");

  if (start) query = query.gte("created_at", start);
  if (end) query = query.lte("created_at", end);

  const { data: transactions } = await query;

  let sales = 0;
  let cost = 0;
  let map = {};

  (transactions || []).forEach(t => {
    sales += t.total_amount || 0;
    cost += t.total_cost || 0;

    (t.items || []).forEach(i => {
      if (!map[i.name]) map[i.name] = { revenue: 0 };
      map[i.name].revenue += i.price * i.qty;
    });
  });

  let profit = sales - cost;

  document.getElementById("sales").innerText = "₹" + sales;
  document.getElementById("profit").innerText = "₹" + profit;

  let labels = [];
  let values = [];
  let html = "";

  for (let name in map) {
    labels.push(name);
    values.push(map[name].revenue);

    html += `
      <tr>
        <td>${name}</td>
        <td>₹${map[name].revenue}</td>
      </tr>
    `;
  }

  document.getElementById("tableBody").innerHTML = html;

  if (pieChart) pieChart.destroy();
  pieChart = new Chart(document.getElementById("pieChart"), {
    type: "pie",
    data: {
      labels: labels,
      datasets: [{ data: values }]
    }
  });

  if (barChart) barChart.destroy();
  barChart = new Chart(document.getElementById("barChart"), {
    type: "bar",
    data: {
      labels: ["Sales", "Profit"],
      datasets: [{ data: [sales, profit] }]
    }
  });
}

window.goPOS = () => window.location = "pos.html";
window.goProducts = () => window.location = "products.html";

window.logout = async function () {
  await supabase.auth.signOut();
  window.location.href = "/";
};

loadUser();
setDate();
loadDashboard();
</script>

</body>
</html>
