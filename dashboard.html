<!DOCTYPE html>
<html>
<head>
  <title>Dashboard</title>

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      display: flex;
    }

    .sidebar {
      width: 220px;
      background: #0f172a;
      color: white;
      height: 100vh;
      padding: 20px;
    }

    .sidebar h2 { margin-bottom: 30px; }
    .sidebar p { margin: 15px 0; cursor: pointer; }

    .main {
      flex: 1;
      background: #f3f4f6;
      padding: 20px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .cards {
      display: flex;
      gap: 20px;
      margin-top: 20px;
    }

    .card {
      background: white;
      padding: 20px;
      border-radius: 10px;
      flex: 1;
    }

    .charts {
      display: flex;
      gap: 20px;
      margin-top: 30px;
    }

    .chart-box {
      flex: 1;
      background: white;
      padding: 20px;
      border-radius: 10px;
      height: 320px;
    }

    canvas {
      width: 100% !important;
      height: 240px !important;
    }

    .table-box {
      margin-top: 30px;
      background: white;
      padding: 20px;
      border-radius: 10px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th, td {
      padding: 10px;
      border-bottom: 1px solid #ddd;
      text-align: left;
    }

    .btn {
      background: #1e3a8a;
      color: white;
      padding: 8px 12px;
      border: none;
      cursor: pointer;
      border-radius: 5px;
    }

    .logout {
      background: red;
    }

  </style>
</head>

<body>

<div class="sidebar">
  <h2>POS System</h2>
  <p>Dashboard</p>
  <p>Point of Sale</p>
  <p>Products</p>
  <p>Reports</p>
</div>

<div class="main">

  <div class="topbar">
    <h2>Dashboard</h2>

    <div>
      <span id="userEmail"></span>
      <button class="btn logout" onclick="logout()">Logout</button>
    </div>
  </div>

  <!-- CARDS -->
  <div class="cards">
    <div class="card">
      <h4>Total Sales</h4>
      <h2 id="sales">₹0</h2>
    </div>

    <div class="card">
      <h4>Total Products</h4>
      <h2 id="products">0</h2>
    </div>

    <div class="card">
      <h4>Profit</h4>
      <h2 id="profit">₹0</h2>
    </div>
  </div>

  <!-- CHARTS -->
  <div class="charts">

    <div class="chart-box">
      <h4>Profit vs Cost</h4>
      <canvas id="pieChart"></canvas>
    </div>

    <div class="chart-box">
      <h4>Sales Overview</h4>
      <canvas id="barChart"></canvas>
    </div>

  </div>

  <!-- PRODUCT SALES TABLE -->
  <div class="table-box">
    <h3>Product Wise Sales</h3>
    <button class="btn" onclick="exportData()">Export Profit Data</button>

    <table>
      <thead>
        <tr>
          <th>Product</th>
          <th>Sold Qty</th>
          <th>Revenue</th>
          <th>Profit</th>
        </tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>
  </div>

</div>

<script type="module">
import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

const supabase = createClient(
  "https://glsjjkcnrhmdiqtfasrv.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imdsc2pqa2NucmhtZGlxdGZhc3J2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgzMzgxNDUsImV4cCI6MjA5MzkxNDE0NX0.kg6Ng-phIWZIBfk0KLFDl0CaRD1IPL_t_8dExIZ4yoM"
);

// USER
async function loadUser() {
  const { data: { user } } = await supabase.auth.getUser();
  if (user) {
    document.getElementById("userEmail").innerText = user.email;
  } else {
    window.location = "index.html";
  }
}

// LOGOUT
async function logout() {
  await supabase.auth.signOut();
  window.location = "index.html";
}

// DASHBOARD DATA
let pieChart, barChart;
let exportDataArr = [];

async function loadDashboard() {

  const { data: products } = await supabase.from("products").select("*");
  document.getElementById("products").innerText = products.length;

  const { data: transactions } = await supabase.from("transactions").select("*");

  let totalSales = 0;
  let totalCost = 0;

  let productMap = {};

  transactions.forEach(t => {
    totalSales += t.total_amount || 0;
    totalCost += t.total_cost || 0;

    if (t.items) {
      t.items.forEach(i => {
        if (!productMap[i.name]) {
          productMap[i.name] = { qty: 0, revenue: 0, profit: 0 };
        }
        productMap[i.name].qty += i.qty;
        productMap[i.name].revenue += i.price * i.qty;
        productMap[i.name].profit += (i.price - i.buying_price) * i.qty;
      });
    }
  });

  let profit = totalSales - totalCost;

  document.getElementById("sales").innerText = "₹" + totalSales;
  document.getElementById("profit").innerText = "₹" + profit;

  // CHART FIX
  if (pieChart) pieChart.destroy();
  if (barChart) barChart.destroy();

  pieChart = new Chart(document.getElementById("pieChart"), {
    type: "pie",
    data: {
      labels: ["Profit", "Cost"],
      datasets: [{
        data: [profit, totalCost]
      }]
    }
  });

  barChart = new Chart(document.getElementById("barChart"), {
    type: "bar",
    data: {
      labels: ["Sales", "Profit"],
      datasets: [{
        data: [totalSales, profit]
      }]
    }
  });

  // TABLE
  let html = "";
  exportDataArr = [];

  for (let name in productMap) {
    let p = productMap[name];

    html += `
      <tr>
        <td>${name}</td>
        <td>${p.qty}</td>
        <td>₹${p.revenue}</td>
        <td>₹${p.profit}</td>
      </tr>
    `;

    exportDataArr.push({
      name,
      qty: p.qty,
      revenue: p.revenue,
      profit: p.profit
    });
  }

  document.getElementById("tableBody").innerHTML = html;
}

// EXPORT CSV
function exportData() {
  let csv = "Product,Qty,Revenue,Profit\n";

  exportDataArr.forEach(d => {
    csv += `${d.name},${d.qty},${d.revenue},${d.profit}\n`;
  });

  let blob = new Blob([csv], { type: "text/csv" });
  let a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "profit_report.csv";
  a.click();
}

// INIT
loadUser();
loadDashboard();

</script>

</body>
</html>
