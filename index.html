<!DOCTYPE html>
<html>
<head>
  <title>Login</title>

  <style>
    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      height: 100vh;
      display: flex;
    }

    .left {
      flex: 1;
      background: linear-gradient(135deg, #0f172a, #1e3a8a);
      color: white;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 100px;
    }

    .left h1 {
      font-size: 36px;
      margin-bottom: 20px;
    }

    .left p {
      color: #cbd5e1;
      max-width: 450px;
      line-height: 1.6;
    }

    .features {
      margin-top: 30px;
      color: #93c5fd;
    }

    .features p {
      margin: 8px 0;
    }

    .right {
      flex: 1;
      background: #f3f4f6;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .card {
      background: white;
      padding: 45px;
      width: 350px;
      border-radius: 16px;
      box-shadow: 0 15px 40px rgba(0,0,0,0.1);
    }

    input {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border-radius: 8px;
      border: 1px solid #ddd;
    }

    input:focus {
      border-color: #1e3a8a;
      outline: none;
    }

    button {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      border: none;
      border-radius: 8px;
      background: linear-gradient(90deg, #0f172a, #1e3a8a);
      color: white;
      cursor: pointer;
    }

    button:hover {
      opacity: 0.9;
    }
  </style>
</head>

<body>

<div class="left">
  <h1>Smart POS & Billing System</h1>
  <p>
    A web-based solution to manage billing, inventory, and sales efficiently.
  </p>

  <div class="features">
    <p>✔ Real-time Billing</p>
    <p>✔ Inventory Management</p>
    <p>✔ Sales Reports</p>
    <p>✔ Tax Calculation</p>
  </div>
</div>

<div class="right">
  <div class="card">

    <h2>Login</h2>

    <input id="email" placeholder="Enter email">
    <input id="password" type="password" placeholder="Enter password">

    <button id="loginBtn">Login</button>

  </div>
</div>

<script type="module">
import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

const supabase = createClient(
  "https://glsjjkcnrhmdiqtfasrv.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imdsc2pqa2NucmhtZGlxdGZhc3J2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgzMzgxNDUsImV4cCI6MjA5MzkxNDE0NX0.kg6Ng-phIWZIBfk0KLFDl0CaRD1IPL_t_8dExIZ4yoM"
);

async function login() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  if (!email || !password) {
    alert("Enter credentials");
    return;
  }

  const { error } = await supabase.auth.signInWithPassword({
    email,
    password
  });

  if (error) {
    alert(error.message);
  } else {
    window.location = "dashboard.html";
  }
}

// BUTTON CLICK
document.getElementById("loginBtn").addEventListener("click", login);

// ENTER KEY SUPPORT (IMPORTANT FIX)
document.addEventListener("keydown", function(e) {
  if (e.key === "Enter") {
    login();
  }
});
</script>

</body>
</html>
