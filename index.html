<!DOCTYPE html>
<html>
<head>
  <title>Login Page</title>

  <style>
    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      height: 100vh;
      display: flex;
    }

    /* LEFT SIDE */
    .left {
      flex: 1;
      background: linear-gradient(135deg, #0f172a, #1e3a8a);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 60px;
    }

    .left-content {
      max-width: 420px;
    }

    .left h1 {
      font-size: 32px;
      margin-bottom: 15px;
    }

    .left p {
      color: #cbd5e1;
      line-height: 1.6;
      margin-bottom: 20px;
    }

    #featureText {
      font-weight: 500;
      color: #93c5fd;
      margin-top: 20px;
    }

    /* RIGHT SIDE */
    .right {
      flex: 1;
      background: #f3f4f6;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .card {
      background: white;
      padding: 40px;
      width: 360px;
      border-radius: 14px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.08);
    }

    h2 {
      margin-bottom: 25px;
      font-weight: 600;
    }

    label {
      font-size: 13px;
      color: #374151;
      font-weight: 500;
    }

    input {
      width: 100%;
      padding: 12px 14px;
      margin: 6px 0 18px 0;
      border-radius: 10px;
      border: 1px solid #e5e7eb;
      font-size: 14px;
      background: #f9fafb;
    }

    input:focus {
      border-color: #1e3a8a;
      background: white;
      box-shadow: 0 0 0 3px rgba(30,58,138,0.1);
      outline: none;
    }

    .btn {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 10px;
      background: linear-gradient(90deg, #0f172a, #1e3a8a);
      color: white;
      font-weight: 500;
      cursor: pointer;
      transition: 0.25s;
    }

    .btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 8px 18px rgba(0,0,0,0.15);
    }

    .error {
      color: #ef4444;
      font-size: 12px;
      display: none;
      margin-top: -12px;
      margin-bottom: 12px;
    }
  </style>
</head>

<body>

<!-- LEFT SIDE -->
<div class="left">
  <div class="left-content">
    <h1>Smart POS & Billing System</h1>

    <p>
      A web-based solution to manage billing, inventory, and sales efficiently.
      Designed for retail businesses with real-time tracking and profit insights.
    </p>

    <p id="featureText"></p>
  </div>
</div>

<!-- RIGHT SIDE -->
<div class="right">
  <div class="card">

    <h2>Login</h2>

    <label>Email</label>
    <input id="email" placeholder="Enter email">
    <div id="emailError" class="error">Required</div>

    <label>Password</label>
    <input id="password" type="password" placeholder="Enter password">
    <div id="passError" class="error">Required</div>

    <button class="btn" onclick="login()">Login</button>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script>
const supabaseClient = supabase.createClient(
  "YOUR_URL",
  "YOUR_KEY"
);

/* FEATURE SLIDER */
const features = [
  "✔ Real-time Billing System",
  "✔ Inventory Management",
  "✔ Sales & Profit Reports",
  "✔ Tax Calculation Support",
  "✔ Easy Product Management"
];

let i = 0;

setInterval(() => {
  document.getElementById("featureText").innerText = features[i];
  i = (i + 1) % features.length;
}, 2000);

/* LOGIN FUNCTION */
async function login() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  let valid = true;

  document.getElementById("emailError").style.display = "none";
  document.getElementById("passError").style.display = "none";

  if (!email) {
    document.getElementById("emailError").style.display = "block";
    valid = false;
  }

  if (!password) {
    document.getElementById("passError").style.display = "block";
    valid = false;
  }

  if (!valid) return;

  const { error } = await supabaseClient.auth.signInWithPassword({
    email,
    password
  });

  if (error) {
    alert("Invalid credentials");
  } else {
    window.location = "dashboard.html";
  }
}
</script>

</body>
</html>
